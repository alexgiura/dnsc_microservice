

services:
  cortex-postgres:
    image: postgres:16-alpine
    container_name: cortex-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    volumes:
      - cortex_pgdata:/var/lib/postgresql/data
      - ./db/init_scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_DB_PORT:-5432}:5432"
    networks:
      - cortex-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_DB_USER} -d ${POSTGRES_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      
 


  cortex-backend:
    container_name: cortex-backend
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB_HOST: cortex-postgres
      POSTGRES_DB_PORT: 5432
    depends_on:
      cortex-postgres:
        condition: service_healthy
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks:
      - cortex-net

volumes:
  cortex_pgdata:

networks:
  cortex-net:
    driver: bridge
