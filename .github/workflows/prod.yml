name: Build and Deploy Prod

on:
  push:
    branches:
      - main

jobs:

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push DNSC backend image
        run: |
          docker build -t alexgiura/dnsc-backend:prod -f backend/Dockerfile backend
          docker push alexgiura/dnsc-backend:prod

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push DNSC frontend image
        run: |
          docker build -t alexgiura/dnsc-frontend:prod -f vue-app/Dockerfile vue-app
          docker push alexgiura/dnsc-frontend:prod

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.DNSC_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Debug SSH Connection
        run: ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.DNSC_SERVER_IP }} "echo SSH connection successful!"

      - name: Create dnsc directory structure
        run: ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.DNSC_SERVER_IP }} "mkdir -p ~/dnsc/letsencrypt"

      - name: Clean up old Docker images and volumes
        run: ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.DNSC_SERVER_IP }} "docker image prune -f"

      - name: Copy docker compose file to server
        run: scp -i ~/.ssh/id_rsa docker-compose.yml ubuntu@${{ secrets.DNSC_SERVER_IP }}:dnsc/docker-compose.yml

      - name: Copy env file to server
        run: scp -i ~/.ssh/id_rsa .env ubuntu@${{ secrets.DNSC_SERVER_IP }}:dnsc/.env

      - name: Deploy to Server
        run: ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.DNSC_SERVER_IP }} "cd dnsc && docker compose pull && docker compose up -d --remove-orphans"
