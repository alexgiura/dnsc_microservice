name: Build and Deploy Prod

on:
  push:
    branches:
      - prod

jobs:

  build-backend-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push ERP API image
        run: |
          docker build -t alexgiura/erp-backend-api:prod -f backend/erp_microservice/Dockerfile backend/erp_microservice
          docker push alexgiura/erp-backend-api:prod

  build-backend-auth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push Auth image
        run: |
          docker build -t alexgiura/erp-backend-auth:prod -f backend/auth_microservice/Dockerfile backend/auth_microservice
          docker push alexgiura/erp-backend-auth:prod

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push Frontend image
        run: |
          docker build -t alexgiura/erp-frontend:prod -f frontend_v2/Dockerfile .
          docker push alexgiura/erp-frontend:prod

  build-landingpage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push Landingpage image
        run: |
          docker build -t alexgiura/erp-landingpage:prod -f bild-landing-nuxt/Dockerfile bild-landing-nuxt
          docker push alexgiura/erp-landingpage:prod

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend-api, build-backend-auth, build-frontend, build-landingpage]
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.DNSC_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Debug SSH Connection
        run: ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ubuntu@${{ secrets.DNSC_SERVER_IP }} "echo SSH connection successful!"

      - name: Create dnsc directory structure
        run: ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.DNSC_SERVER_IP }} "mkdir -p ~/dnsc/letsencrypt"

      - name: Clean up old Docker images and volumes
        run: ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.DNSC_SERVER_IP }} "docker image prune -f"

      - name: Copy docker compose file to server
        run: scp -i ~/.ssh/id_rsa docker-compose.yml ubuntu@${{ secrets.DNSC_SERVER_IP }}:dnsc/docker-compose.yml

      - name: Copy env file to server
        run: scp -i ~/.ssh/id_rsa backend/.env ubuntu@${{ secrets.DNSC_SERVER_IP }}:dnsc/.env

      - name: Deploy to Server
        run: ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.DNSC_SERVER_IP }} "cd dnsc && docker compose pull && docker compose up -d --remove-orphans"
